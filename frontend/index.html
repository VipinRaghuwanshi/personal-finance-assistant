<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Finance AI</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <!-- HEADER -->
        <div class="top">
            <div class="branding">
                <div class="logo-wrap">
                    <div class="ai-logo">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <h2 class="logo-text">Personal Finance Assistant AI</h2>
                </div>
                <p class="tagline">Smart money tracking & AI insights</p>
            </div>

            <div class="balance">
                <span>Balance</span>
                <h1 id="balance">₹0</h1>
            </div>
        </div>

        <!-- BUTTONS -->
        <div class="actions">
            <button onclick="quickIncome()">+ Income</button>
            <button onclick="quickExpense()">+ Expense</button>
            <button onclick="checkBalance()">Balance</button>
            <button onclick="showInsights()">Insights</button>
        </div>

        <!-- CHAT -->
        <div id="chat">
            <div class="chat-inner"></div>
        </div>

        <!-- INPUT -->
        <div class="input-container">
            <div class="input-wrapper">
                <input id="input" placeholder="Ask anything..." />
                <button onclick="send()">➤</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
